  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&display=swap" rel="stylesheet" />

  <style>
    /* CSS will be injected here - keeping it minimal for now */
    :root {
      --bg: #0a0a0f;
      --bg2: #14141f;
      --surface: #1a1a2e;
      --primary: #e040fb;
      --accent: #ff4081;
      --text: #f0f0f8;
      --text-muted: #8888aa;
      --text-dim: #555570;
      --border: rgba(255,255,255,0.07);
      --radius: 16px;
      --font: 'Inter', sans-serif;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: var(--font);
      background: var(--bg);
      color: var(--text);
      line-height: 1.6;
    }
    .container { max-width: 1200px; margin: 0 auto; padding: 0 24px; }
    
    /* NAV */
    nav {
      position: fixed; top: 0; left: 0; right: 0; z-index: 100;
      background: rgba(10,10,15,0.9); backdrop-filter: blur(20px);
      border-bottom: 1px solid var(--border);
    }
    .nav__inner {
      display: flex; align-items: center; justify-content: space-between;
      height: 64px;
    }
    .nav__logo { font-weight: 800; font-size: 1.25rem; letter-spacing: -0.02em; }
    .nav__logo span { color: var(--primary); }
    .nav__links { display: flex; gap: 32px; list-style: none; }
    .nav__links a {
      color: var(--text-muted); text-decoration: none; font-size: 0.9rem;
      font-weight: 500; transition: color 0.2s;
    }
    .nav__links a:hover { color: var(--text); }
    .nav__cta {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; padding: 10px 20px; border-radius: 100px;
      text-decoration: none; font-weight: 600; font-size: 0.85rem;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .nav__cta:hover { transform: translateY(-2px); box-shadow: 0 8px 24px rgba(224,64,251,0.3); }

    /* HERO */
    .hero {
      min-height: 100vh; display: flex; align-items: center;
      padding-top: 80px; position: relative; overflow: hidden;
    }
    .hero__bg {
      position: absolute; inset: 0;
      background: radial-gradient(ellipse at 30% 20%, rgba(224,64,251,0.15) 0%, transparent 50%),
                  radial-gradient(ellipse at 70% 80%, rgba(255,64,129,0.1) 0%, transparent 50%);
    }
    .hero__inner {
      display: grid; grid-template-columns: 1fr 1fr; gap: 64px; align-items: center;
      position: relative; z-index: 1;
    }
    .hero__badge {
      display: inline-flex; align-items: center; gap: 8px;
      background: rgba(224,64,251,0.1); border: 1px solid rgba(224,64,251,0.2);
      padding: 8px 16px; border-radius: 100px; font-size: 0.85rem;
      color: var(--primary); margin-bottom: 24px;
    }
    .hero__title {
      font-size: 3.5rem; font-weight: 900; line-height: 1.1;
      letter-spacing: -0.03em; margin-bottom: 24px;
    }
    .hero__title .gradient {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
      background-clip: text;
    }
    .hero__subtitle {
      font-size: 1.1rem; color: var(--text-muted); line-height: 1.7;
      margin-bottom: 32px; max-width: 480px;
    }
    .hero__ctas { display: flex; gap: 16px; margin-bottom: 40px; }
    .btn {
      display: inline-flex; align-items: center; gap: 8px;
      padding: 14px 28px; border-radius: 100px; font-weight: 600;
      text-decoration: none; font-size: 0.95rem; transition: all 0.2s;
      cursor: pointer; border: none;
    }
    .btn--primary {
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; box-shadow: 0 4px 20px rgba(224,64,251,0.3);
    }
    .btn--primary:hover { transform: translateY(-2px); box-shadow: 0 8px 32px rgba(224,64,251,0.4); }
    .btn--outline {
      background: transparent; color: var(--text);
      border: 1px solid var(--border);
    }
    .btn--outline:hover { border-color: var(--primary); color: var(--primary); }
    .hero__stats { display: flex; gap: 32px; }
    .hero__stat { text-align: center; }
    .hero__stat-value { font-size: 1.5rem; font-weight: 800; color: var(--primary); }
    .hero__stat-label { font-size: 0.8rem; color: var(--text-dim); }
    .hero__image {
      position: relative; border-radius: var(--radius); overflow: hidden;
      aspect-ratio: 4/5; background: var(--surface);
      border: 1px solid var(--border);
    }
    .hero__image img { width: 100%; height: 100%; object-fit: cover; }
    .hero__image::after {
      content: ''; position: absolute; inset: 0;
      background: linear-gradient(to top, rgba(10,10,15,0.8) 0%, transparent 40%);
    }

    /* SECTIONS */
    .section { padding: 100px 0; }
    .section--alt { background: var(--bg2); }
    .section-header { text-align: center; max-width: 600px; margin: 0 auto 64px; }
    .section__badge {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(224,64,251,0.1); padding: 6px 14px;
      border-radius: 100px; font-size: 0.8rem; color: var(--primary);
      margin-bottom: 16px;
    }
    .section__title { font-size: 2.5rem; font-weight: 800; margin-bottom: 16px; }
    .section__subtitle { color: var(--text-muted); font-size: 1.05rem; }

    /* SHOWCASE */
    .showcase__grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    }
    .showcase-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); overflow: hidden;
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .showcase-card:hover { transform: translateY(-8px); box-shadow: 0 20px 40px rgba(0,0,0,0.4); }
    .showcase-card__image {
      aspect-ratio: 1; background: linear-gradient(135deg, rgba(224,64,251,0.2), rgba(255,64,129,0.1));
      display: flex; align-items: center; justify-content: center; font-size: 3rem;
    }
    .showcase-card__body { padding: 20px; }
    .showcase-card__name { font-weight: 700; margin-bottom: 4px; }
    .showcase-card__type { font-size: 0.8rem; color: var(--primary); margin-bottom: 12px; }
    .showcase-card__tags { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
    .showcase-card__tag {
      font-size: 0.7rem; background: rgba(224,64,251,0.1);
      color: var(--primary); padding: 4px 10px; border-radius: 100px;
    }
    .showcase-card__cta { width: 100%; text-align: center; justify-content: center; padding: 10px; font-size: 0.85rem; }

    /* FEATURES */
    .features__grid {
      display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px;
    }
    .feature-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
      transition: transform 0.3s, border-color 0.3s;
    }
    .feature-card:hover { transform: translateY(-4px); border-color: rgba(224,64,251,0.3); }
    .feature-card__icon {
      width: 48px; height: 48px; border-radius: 12px;
      background: linear-gradient(135deg, rgba(224,64,251,0.2), rgba(255,64,129,0.1));
      display: flex; align-items: center; justify-content: center;
      font-size: 1.5rem; margin-bottom: 20px;
    }
    .feature-card__title { font-size: 1.1rem; font-weight: 700; margin-bottom: 12px; }
    .feature-card__desc { font-size: 0.9rem; color: var(--text-muted); line-height: 1.6; }

    /* HOW IT WORKS */
    .how__steps {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 32px;
    }
    .how__step {
      text-align: center; padding: 40px 24px;
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); position: relative;
    }
    .how__step-number {
      width: 48px; height: 48px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-weight: 800; color: white; margin: 0 auto 20px;
    }
    .how__step-title { font-size: 1.2rem; font-weight: 700; margin-bottom: 12px; }
    .how__step-desc { color: var(--text-muted); font-size: 0.9rem; }

    /* PRICING */
    .pricing__grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    }
    .pricing-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 32px;
      transition: transform 0.3s;
    }
    .pricing-card:hover { transform: translateY(-4px); }
    .pricing-card--featured {
      border-color: var(--primary); position: relative;
      transform: scale(1.05);
    }
    .pricing-card__badge {
      position: absolute; top: -12px; left: 50%; transform: translateX(-50%);
      background: linear-gradient(135deg, var(--primary), var(--accent));
      color: white; padding: 6px 16px; border-radius: 100px;
      font-size: 0.75rem; font-weight: 700;
    }
    .pricing-card__name { font-size: 1.1rem; font-weight: 700; margin-bottom: 8px; }
    .pricing-card__price { margin-bottom: 16px; }
    .pricing-card__amount { font-size: 2.5rem; font-weight: 800; }
    .pricing-card__period { color: var(--text-muted); font-size: 0.9rem; }
    .pricing-card__desc { color: var(--text-muted); font-size: 0.85rem; margin-bottom: 24px; }
    .pricing-card__features { list-style: none; margin-bottom: 24px; }
    .pricing-card__feature {
      display: flex; align-items: center; gap: 10px;
      padding: 8px 0; font-size: 0.9rem; color: var(--text-muted);
    }
    .pricing-card__feature-icon { color: var(--primary); font-weight: 700; }

    /* COMPARISON */
    .comparison-table {
      width: 100%; border-collapse: collapse;
      background: var(--surface); border-radius: var(--radius);
      overflow: hidden; border: 1px solid var(--border);
    }
    .comparison-table th, .comparison-table td {
      padding: 16px 20px; text-align: left; border-bottom: 1px solid var(--border);
    }
    .comparison-table th {
      background: rgba(224,64,251,0.05); font-weight: 600; font-size: 0.85rem;
      text-transform: uppercase; letter-spacing: 0.05em; color: var(--text-muted);
    }
    .comparison-table td { font-size: 0.9rem; }
    .comparison-table tr:last-child td { border-bottom: none; }
    .comparison-table .check { color: var(--primary); font-weight: 700; }
    .comparison-table .cross { color: var(--text-dim); }

    /* TESTIMONIALS */
    .testimonials__grid {
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 24px;
    }
    .testimonial-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); padding: 28px;
    }
    .testimonial-card__stars { color: #ffd700; margin-bottom: 16px; font-size: 1.1rem; }
    .testimonial-card__text { font-size: 0.95rem; line-height: 1.7; margin-bottom: 20px; color: var(--text-muted); }
    .testimonial-card__author { display: flex; align-items: center; gap: 12px; }
    .testimonial-card__avatar {
      width: 40px; height: 40px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: flex; align-items: center; justify-content: center;
      font-weight: 700; color: white;
    }
    .testimonial-card__name { font-weight: 600; }
    .testimonial-card__role { font-size: 0.8rem; color: var(--text-dim); }

    /* FAQ */
    .faq__list { max-width: 800px; margin: 0 auto; }
    .faq-item {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--radius); margin-bottom: 12px; overflow: hidden;
    }
    .faq-item__question {
      width: 100%; padding: 20px 24px; background: none; border: none;
      color: var(--text); font-size: 1rem; font-weight: 600;
      text-align: left; cursor: pointer; display: flex;
      justify-content: space-between; align-items: center;
    }
    .faq-item__answer {
      padding: 0 24px 20px; color: var(--text-muted); line-height: 1.7;
      display: none;
    }
    .faq-item.open .faq-item__answer { display: block; }
    .faq-item__icon { transition: transform 0.3s; }
    .faq-item.open .faq-item__icon { transform: rotate(180deg); }

    /* CTA FINAL */
    .cta-final {
      text-align: center; padding: 120px 0;
      background: radial-gradient(ellipse at center, rgba(224,64,251,0.1) 0%, transparent 70%);
    }
    .cta-final__title { font-size: 3rem; font-weight: 900; margin-bottom: 20px; }
    .cta-final__subtitle { color: var(--text-muted); font-size: 1.1rem; margin-bottom: 40px; }
    .cta-final__note { margin-top: 24px; font-size: 0.85rem; color: var(--text-dim); }

    /* FOOTER */
    footer {
      background: #060609; border-top: 1px solid var(--border); padding: 48px 0 32px;
    }
    .footer__inner {
      display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 24px;
    }
    .footer__brand { font-weight: 800; font-size: 1.1rem; }
    .footer__brand span { color: var(--primary); }
    .footer__links { display: flex; gap: 24px; list-style: none; }
    .footer__links a { color: var(--text-dim); text-decoration: none; font-size: 0.85rem; transition: color 0.2s; }
    .footer__links a:hover { color: var(--text); }
    .footer__copyright { color: var(--text-dim); font-size: 0.8rem; }
    .footer__disclosure {
      margin-top: 24px; padding-top: 24px; border-top: 1px solid var(--border);
      font-size: 0.75rem; color: var(--text-dim); line-height: 1.6; max-width: 800px;
    }

    /* RESPONSIVE */
    @media (max-width: 1024px) {
      .hero__inner { grid-template-columns: 1fr; text-align: center; }
      .hero__subtitle { margin-left: auto; margin-right: auto; }
      .hero__ctas { justify-content: center; }
      .hero__image { max-width: 400px; margin: 0 auto; }
      .showcase__grid { grid-template-columns: repeat(2, 1fr); }
      .features__grid { grid-template-columns: repeat(2, 1fr); }
    }
    @media (max-width: 768px) {
      .hero__title { font-size: 2.5rem; }
      .section__title { font-size: 2rem; }
      .nav__links { display: none; }
      .showcase__grid { grid-template-columns: 1fr; }
      .features__grid { grid-template-columns: 1fr; }
      .how__steps { grid-template-columns: 1fr; }
      .pricing__grid { grid-template-columns: 1fr; }
      .pricing-card--featured { transform: scale(1); }
      .testimonials__grid { grid-template-columns: 1fr; }
      .footer__inner { flex-direction: column; text-align: center; }
    }
  </style>
</head>

  <!-- JAVASCRIPT -->
  <script>
    /* i18n loader */
    function resolve(obj, path) {
      return path.split('.').reduce((acc, key) => (acc && acc[key] !== undefined ? acc[key] : null), obj);
    }

    function applyI18n(data) {
      document.querySelectorAll('[data-i18n]').forEach(el => {
        const val = resolve(data, el.getAttribute('data-i18n'));
        if (val !== null) el.textContent = val;
      });
      document.querySelectorAll('[data-i18n-attr]').forEach(el => {
        const [attr, key] = el.getAttribute('data-i18n-attr').split('|');
        const val = resolve(data, key);
        if (val !== null) el.setAttribute(attr, val);
      });
      const titleVal = resolve(data, 'meta.title');
      if (titleVal) document.title = titleVal;
    }

    fetch('content.json')
      .then(r => r.json())
      .then(data => applyI18n(data))
      .catch(err => console.warn('[i18n]', err));

    /* FAQ Accordion */
    document.addEventListener('DOMContentLoaded', () => {
      document.querySelectorAll('.faq-item__question').forEach(btn => {
        btn.addEventListener('click', () => {
          const item = btn.closest('.faq-item');
          const isOpen = item.classList.contains('open');
          document.querySelectorAll('.faq-item').forEach(i => i.classList.remove('open'));
          if (!isOpen) item.classList.add('open');
        });
      });
    });
  </script>
